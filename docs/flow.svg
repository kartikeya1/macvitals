<svg width="920" height="200" viewBox="0 0 920 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- step 1 -->
  <g>
    <rect x="8" y="40" width="264" height="120" rx="16" fill="#ffffff" stroke="#d3dae6"/>
    <circle cx="40" cy="72" r="15" fill="#e9f0fe"/>
    <text x="40" y="78" text-anchor="middle" font-size="16" font-weight="800" fill="#2563eb">1</text>
    <text x="66" y="78" font-size="18" font-weight="700" fill="#0f172a">Get the collector</text>
    <text x="28" y="112" font-size="13.5" fill="#64748b">Copy one command from the</text>
    <text x="28" y="132" font-size="13.5" fill="#64748b">site (or download the script).</text>
  </g>

  <!-- arrow -->
  <path d="M286 100 H324" stroke="url(#acc)" stroke-width="3" stroke-linecap="round"/>
  <path d="M318 92 L328 100 L318 108" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- step 2 -->
  <g>
    <rect x="340" y="40" width="264" height="120" rx="16" fill="#ffffff" stroke="#d3dae6"/>
    <circle cx="372" cy="72" r="15" fill="#e9f0fe"/>
    <text x="372" y="78" text-anchor="middle" font-size="16" font-weight="800" fill="#2563eb">2</text>
    <text x="398" y="78" font-size="18" font-weight="700" fill="#0f172a">Run it locally</text>
    <text x="360" y="112" font-size="13.5" fill="#64748b">Reads the Mac (no changes),</text>
    <text x="360" y="132" font-size="13.5" fill="#64748b">writes a report folder + .zip.</text>
  </g>

  <!-- arrow -->
  <path d="M618 100 H656" stroke="url(#acc)" stroke-width="3" stroke-linecap="round"/>
  <path d="M650 92 L660 100 L650 108" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- step 3 -->
  <g>
    <rect x="672" y="40" width="240" height="120" rx="16" fill="#ffffff" stroke="#d3dae6"/>
    <circle cx="704" cy="72" r="15" fill="#e9f0fe"/>
    <text x="704" y="78" text-anchor="middle" font-size="16" font-weight="800" fill="#2563eb">3</text>
    <text x="730" y="78" font-size="18" font-weight="700" fill="#0f172a">See the verdict</text>
    <text x="692" y="112" font-size="13.5" fill="#64748b">Drop the report on the site —</text>
    <text x="692" y="132" font-size="13.5" fill="#64748b">parsed 100% in your browser.</text>
  </g>
</svg>
